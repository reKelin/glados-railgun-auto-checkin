name: GLaDOS/Railgun 自动签到

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  schedule:
    - cron: '0 4,10 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install pypushdeer

      - name: 执行签到
        run: python checkin.py
        env:
          PUSHDEER_SENDKEY: ${{ secrets.PUSHDEER_SENDKEY }}
          GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
          GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
          GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}

      - name: 清理旧工作流记录
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'checkin.yml',
              status: 'completed',
              per_page: 100
            });
            const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
            let deleted = 0;
            for (const run of runs.workflow_runs) {
              if (new Date(run.created_at).getTime() < cutoff) {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id
                });
                deleted++;
              }
            }
            console.log(`已删除 ${deleted} 条旧工作流记录`);
